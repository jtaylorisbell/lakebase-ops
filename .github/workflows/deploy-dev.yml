name: Deploy to Dev

on:
  push:
    branches: [main]

env:
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: databricks/setup-cli@main
      - run: uv sync --extra migrations

      - name: Deploy bundle (creates app + service principal)
        run: databricks bundle deploy -t dev

      - name: Create Postgres role for App service principal
        run: uv run python scripts/manage_roles.py --app lakebase-todo-app-dev

      - name: Provision user database roles
        run: |
          python3 -c "
          import json, subprocess, sys
          data = json.load(open('scripts/db_access.json'))
          for flag, key in [('--engineers', 'readwrite'), ('--readonly', 'readonly')]:
              users = data.get(key, [])
              if users:
                  subprocess.run(['uv', 'run', 'python', 'scripts/manage_roles.py', flag] + users, check=True)
          "

      - name: Run database migrations
        run: uv run alembic upgrade head

      - name: Deploy app source code
        run: databricks bundle run -t dev todo_app
