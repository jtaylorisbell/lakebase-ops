name: Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - roles-only

env:
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  terraform:
    name: Terraform ${{ inputs.action }}
    if: inputs.action != 'roles-only'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve

  roles:
    name: Create Postgres roles
    needs: [terraform]
    # Run even if terraform was skipped (roles-only) or failed (project already exists)
    if: always() && (inputs.action == 'apply' || inputs.action == 'roles-only')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra migrations

      - name: Parse user lists from terraform.tfvars
        id: users
        run: |
          cd terraform
          python3 -c "
          import re, json
          text = open('terraform.tfvars').read()
          def parse_list(name):
              m = re.search(rf'{name}\s*=\s*\[(.*?)\]', text, re.DOTALL)
              if not m: return []
              return [s.strip().strip('\"') for s in m.group(1).split(',') if s.strip().strip('\"')]
          manage = parse_list('manage_users')
          use = parse_list('use_users')
          print(f'manage={json.dumps(manage)}')
          print(f'use={json.dumps(use)}')
          " >> "$GITHUB_OUTPUT"

      - name: Create read-write roles (CAN_MANAGE users)
        if: steps.users.outputs.manage != '[]'
        run: |
          uv run python scripts/manage_roles.py --engineers \
            $(echo '${{ steps.users.outputs.manage }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))")

      - name: Create read-only roles (CAN_USE users)
        if: steps.users.outputs.use != '[]'
        run: |
          uv run python scripts/manage_roles.py --readonly \
            $(echo '${{ steps.users.outputs.use }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))")
